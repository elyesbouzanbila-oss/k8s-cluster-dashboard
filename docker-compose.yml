services:
  dashboard-backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:?API_KEY is required — set it in .env or the shell environment}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - ~/.kube/config:/root/.kube/config:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - dashboard-backend

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-}"]
    volumes:
      - redis-data:/data

volumes:
  redis-data:
