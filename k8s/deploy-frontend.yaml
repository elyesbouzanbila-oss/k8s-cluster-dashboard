apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  labels:
    app: dashboard-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-frontend
  template:
    metadata:
      labels:
        app: dashboard-frontend
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: frontend
          image: dashboard-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5173
              protocol: TCP
          env:
            # API key for backend auth (injected into JS at build time)
            - name: VITE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dashboard-api-key
                  key: api-key
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
