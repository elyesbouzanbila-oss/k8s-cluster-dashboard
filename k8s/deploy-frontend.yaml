apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  labels:
    app: dashboard-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-frontend
  template:
    metadata:
      labels:
        app: dashboard-frontend
    spec:
      # No nodeSelector — the frontend (static files + nginx proxy) can run
      # on any node. Only the backend needs to be on the control-plane node
      # for in-cluster API access (and that's handled by its own deployment).
      containers:
        - name: frontend
          image: dashboard-frontend:latest
          # Use IfNotPresent so the image is either loaded locally (kind load)
          # or pulled from a registry. Change to Always if you push to a registry.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
              protocol: TCP
          # API key removed from frontend — authentication is handled
          # by the nginx reverse proxy or an external authenticating proxy.
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
