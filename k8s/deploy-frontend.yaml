apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-frontend
  labels:
    app: dashboard-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-frontend
  template:
    metadata:
      labels:
        app: dashboard-frontend
    spec:
      containers:
        - name: frontend
          image: dashboard-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5173
              protocol: TCP
          env:
            - name: VITE_API_URL
              value: "http://dashboard-backend:8000"
            - name: VITE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: dashboard-api-key
                  key: api-key
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
