apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend
  labels:
    app: dashboard-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-backend
  template:
    metadata:
      labels:
        app: dashboard-backend
    spec:
      serviceAccountName: dashboard-sa
      # No nodeSelector — the backend can use in-cluster auth from any node
      # via its service account (dashboard-sa).
      containers:
        - name: backend
          image: dashboard-backend:latest
          # imagePullPolicy: Never — local/kind cluster only! In production,
          # remove this line or change to Always / IfNotPresent so the pod
          # pulls from a real container registry.
          # Use IfNotPresent so the image is either loaded locally (kind load)
          # or pulled from a registry. Change to Always if you push to a registry.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: K8S_MODE
              value: "incluster"
            # FRONTEND_URL is used by the CORS middleware. Since all browser
            # requests go through the same-origin nginx proxy on the frontend pod,
            # CORS is not enforced for normal operation. Set this to the external
            # URL if you need direct backend access from a different origin.
            - name: FRONTEND_URL
              value: "http://dashboard-frontend:5173"
            # API_KEY is no longer sent from the frontend. To protect the
            # diagnostics POST endpoint, set this via a Kubernetes Secret.
            # The backend checks X-API-Key header against this value.
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: dashboard-api-key
                  key: api-key
            - name: REDIS_URL
              value: "redis://dashboard-redis:6379/0"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashboard-redis-password
                  key: redis-password
            - name: PROMETHEUS_URL
              value: "http://monitor-kube-prometheus-st-prometheus.monitoring.svc.cluster.local:9090"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
