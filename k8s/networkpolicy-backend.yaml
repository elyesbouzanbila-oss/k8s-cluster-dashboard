apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dashboard-backend
spec:
  podSelector:
    matchLabels:
      app: dashboard-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dashboard-frontend
      ports:
        - port: 8000
          protocol: TCP
