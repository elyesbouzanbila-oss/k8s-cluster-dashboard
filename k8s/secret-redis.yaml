apiVersion: v1
kind: Secret
metadata:
  name: dashboard-redis-password
type: Opaque
stringData:
  # IMPORTANT: This file is .gitignored (see project .gitignore).
  # Before deploying to a cluster, generate the real secret there:
  #   REDIS_PASSWORD=$(openssl rand -base64 32)
  #   kubectl create secret generic dashboard-redis-password -n k8s-dashboard \
  #     --from-literal=redis-password="$REDIS_PASSWORD" --dry-run=client -o yaml \
  #   | kubectl apply -f -
  redis-password: "change-me-to-a-real-secret"
