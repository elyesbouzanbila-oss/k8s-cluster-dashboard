apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-redis
  labels:
    app: dashboard-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-redis
  template:
    metadata:
      labels:
        app: dashboard-redis
    spec:
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: dashboard-redis-pvc
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              protocol: TCP
          command:
            - redis-server
          args:
            - --requirepass
            - "$(REDIS_PASSWORD)"
            - --save
            - "60"
            - "1"
            - --appendonly
            - "yes"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dashboard-redis-password
                  key: redis-password
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
