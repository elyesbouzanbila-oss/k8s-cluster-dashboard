---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-redis
  namespace: k8s-dashboard
  labels:
    app: dashboard-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-redis
  template:
    metadata:
      labels:
        app: dashboard-redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: dashboard-redis
  namespace: k8s-dashboard
spec:
  selector:
    app: dashboard-redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  type: ClusterIP
