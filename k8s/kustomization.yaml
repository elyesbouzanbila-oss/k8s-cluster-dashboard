apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: k8s-dashboard

resources:
  - namespace.yaml
  - sa.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - secret.yaml
  - deploy-backend.yaml
  - svc-backend.yaml
  - deploy-frontend.yaml
  - svc-frontend.yaml
  - deploy-redis.yaml
  - svc-redis.yaml
  - pvc-redis.yaml
  - secret-redis.yaml
  - networkpolicy-redis.yaml
  - networkpolicy-backend.yaml
  # cert-issuer.yaml is NOT listed here intentionally:
  # deploy.sh applies it *conditionally* (only when cert-manager
  # is detected). Adding it globally would break standalone
  # 'kubectl apply -k k8s/' runs on clusters without cert-manager.
