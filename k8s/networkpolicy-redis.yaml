apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dashboard-redis
spec:
  podSelector:
    matchLabels:
      app: dashboard-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dashboard-backend
      ports:
        - port: 6379
          protocol: TCP
